<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Calculateur BaZi 八字</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:transparent;color:#222;padding:0.5rem;overflow-x:hidden}
.app{max-width:1050px;margin:0 auto}
.section{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:1rem;margin-bottom:12px;text-align:center}
.sec-title{font-size:11px;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}

/* Formulaire */
.form-card{border:1.5px solid #888;border-radius:6px;overflow:hidden;display:inline-flex;flex-direction:column;min-width:320px;max-width:100%;text-align:left}
.form-row{display:flex;align-items:center;border-bottom:0.5px solid #ccc}
.form-row:last-child{border-bottom:none}
.form-label{font-size:11px;color:#666;width:110px;flex-shrink:0;padding:7px 10px;background:#f5f5f3;border-right:0.5px solid #ccc;text-align:right}
.form-input{padding:5px 10px;flex:1;display:flex;align-items:center}
.form-input select,.form-input input[type=number]{border:none;background:transparent;color:#222;font-size:13px;font-weight:500;padding:2px 0;outline:none;width:100%;-moz-appearance:textfield}
.form-input input[type=number]::-webkit-inner-spin-button,.form-input input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.form-input input[type=text]{border:none;background:transparent;color:#222;font-size:13px;font-weight:500;padding:2px 0;outline:none;width:100%}
.spinner-wrap{display:flex;align-items:center;flex:1;gap:6px}
.spin-btns{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.spin-btn{width:16px;height:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#999;font-size:9px;line-height:1;user-select:none;border-radius:2px}
.spin-btn:hover{color:#222;background:#eee}
.form-btn-row{padding:10px;text-align:center;border-top:1px solid #ccc;background:#f5f5f3}
.btn{padding:8px 32px;background:#fff;border:0.5px solid #888;border-radius:6px;font-size:13px;font-weight:500;color:#222;cursor:pointer}
.btn:hover{background:#f0f0ee}

/* Tableau thème */
.bazi-wrap{border:1.5px solid #888;border-radius:4px;overflow:hidden}
.bazi-table{width:100%;border-collapse:collapse;table-layout:fixed}
.bazi-table td{border:0.5px solid #bbb;padding:0;vertical-align:middle}
.row-label{font-size:10px;color:#555;text-align:center;vertical-align:middle;padding:6px 8px;background:#f5f5f3;width:105px;border-right:1.5px solid #888 !important;line-height:1.4}
.col-pilier{text-align:center}
.cell-header{font-size:11px;color:#555;padding:6px 4px;background:#f5f5f3;text-align:center;font-weight:500}
.cell-data{font-size:12px;color:#222;padding:6px 4px;text-align:center;font-weight:500}
.cell-tronc{display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;gap:2px}
.cell-god{font-size:11px;color:#555;min-height:11px}
.hs-god{font-size:10px;color:#555}
.cell-hs{display:flex;flex-direction:column;align-items:center;padding:5px 4px;gap:0}
.hs-slot{display:flex;flex-direction:column;align-items:center;gap:1px;min-height:42px;justify-content:flex-start;padding-top:2px}
.cell-stars{font-size:11px;color:#444;padding:5px 4px;text-align:center;line-height:1.6}
.cell-nayin{font-size:11px;color:#555;padding:5px 4px;text-align:center;line-height:1.3}

/* Maître */
.dm-section{display:flex;align-items:center;gap:14px}
.dm-details{flex:1}
.dm-name{font-size:14px;font-weight:500}
.dm-sub{font-size:12px;color:#888;margin-top:2px}
.sbar{height:7px;background:#eee;border-radius:4px;overflow:hidden;margin-top:5px}
.sbar-fill{height:100%;border-radius:4px}
.sbar-lbl{font-size:11px;color:#888;margin-top:3px}

/* 5 éléments */
.elem-bars{display:flex;flex-direction:column;gap:5px}
.e-row{display:flex;align-items:center;gap:8px}
.e-name{font-size:12px;width:45px}
.e-role{font-size:10px;width:75px;color:#888}
.e-bg{flex:1;height:7px;background:#eee;border-radius:4px;overflow:hidden}
.e-fill{height:100%;border-radius:4px}
.e-pct{font-size:11px;color:#888;width:30px;text-align:right}

/* Dayuns */
.dayuns-outer{overflow-x:auto}.dayuns-inner{min-width:680px}
.lp-wrap{border:1.5px solid #888;border-radius:4px;overflow:hidden}
.lp-header-row{display:flex;flex-direction:row-reverse;border-bottom:1.5px solid #888}
.lp-header-row>div{flex:1;min-width:0;text-align:center;font-size:10px;font-weight:500;color:#777;padding:5px 2px;background:#f5f5f3;border-left:0.5px solid #bbb}
.lp-header-row>div:last-child{border-left:none}
.lp-grid-row{display:flex;flex-direction:row-reverse;border-bottom:0.5px solid #bbb}
.lp-grid-row>*{flex:1;min-width:0;border-left:0.5px solid #bbb}.lp-grid-row>*:last-child{border-left:none}
.lp-stars-row{display:flex;flex-direction:row-reverse;border-bottom:0.5px solid #bbb}
.lp-stars-row>*{flex:1;min-width:0;border-left:0.5px solid #bbb}.lp-stars-row>*:last-child{border-left:none}
.lp-nayin-row{display:flex;flex-direction:row-reverse}
.lp-nayin-row>*{flex:1;min-width:0;border-left:0.5px solid #bbb}.lp-nayin-row>*:last-child{border-left:none}
.lp-stars-cell{text-align:center;font-size:10px;color:#444;padding:4px 3px;line-height:1.5;min-height:14px}
.lp-nayin-cell{text-align:center;font-size:10px;color:#555;padding:4px 3px;line-height:1.3}
.lp-years-title{font-size:12px;color:#888;margin-top:16px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.lp-years-wrap{border:1.5px solid #888;border-radius:4px;overflow:hidden}
.lp-years-grid{display:flex;flex-direction:row-reverse;align-items:stretch}
.lp-years-grid>*{flex:1;min-width:0;border-left:0.5px solid #bbb}.lp-years-grid>*:last-child{border-left:none}
.lp-years-col{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:5px 3px}
.lp-year-item{display:flex;align-items:center;justify-content:center;gap:3px;padding:1px 0}
.lp-year-item.cur{background:rgb(221,221,221);border-radius:3px;padding:1px 3px;margin:0 -3px}
.lp-year-num{font-size:9px;color:#555;white-space:nowrap;flex-shrink:0;width:28px;text-align:right}
.lp-col{text-align:center;display:flex;flex-direction:column;overflow:hidden}.lp-col.lp-cur{background:rgb(221,221,221)}
.lp-tronc{display:flex;flex-direction:column;align-items:center;padding:5px 3px 3px;gap:1px}
.lp-div{height:0.5px;background:#ccc;flex-shrink:0}
.lp-branch{display:flex;flex-direction:column;align-items:center;padding:5px 3px 3px;gap:1px}
.lp-hs{display:flex;flex-direction:column;align-items:center;padding:3px;gap:0}
.lp-hs-slot{display:flex;flex-direction:column;align-items:center;gap:1px;min-height:33px;justify-content:flex-start;padding-top:2px}
</style>
<style>
.print-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 24px;background:#fff;border:0.5px solid #888;border-radius:6px;font-size:13px;font-weight:500;color:#444;cursor:pointer}
.print-btn:hover{background:#f0f0ee}
.print-footer{display:none}

  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  #pr-theme{flex:0 0 auto!important}
  #pr-curdayun,#pr-curyear{min-width:70px!important;border:0.5px solid #888!important}
  .bazi-wrap{border:0.5px solid #aaa!important}
  .bazi-table td{border:0.5px solid #ccc!important}
  .row-label{background:#f0f0f0!important;font-size:8px!important;width:75px!important;padding:2px 3px!important}
  .cell-header{background:#f0f0f0!important;font-size:8px!important;padding:2px!important}
  .cell-data{font-size:8px!important;padding:2px!important}
  .cell-tronc{padding:3px 2px!important}
  .cell-god{font-size:7px!important;min-height:9px!important}
  .hs-slot{min-height:28px!important}
  .cell-stars,.cell-nayin{font-size:7px!important;padding:2px!important}
  .e-bg{background:#ddd!important}
  .lp-col.lp-cur{background:rgb(221,221,221)!important}
  .lp-year-item.cur{background:rgb(221,221,221)!important}
  .dayuns-outer{overflow:visible!important}
  .dayuns-inner{min-width:0!important;width:100%!important}
  .lp-wrap,.lp-years-wrap{border:0.5px solid #aaa!important}
  .lp-header-row>div{font-size:7px!important;padding:2px!important}

}
</style>
</head>
<body>
<div class="app">
<div class="section" id="form-section">
  <div class="sec-title">Données de naissance</div>
  <div class="form-card">
    <div class="form-row"><div class="form-label">Année</div><div class="form-input"><div class="spinner-wrap"><input type="number" id="yr" min="1900" max="2060" value="1986" oninput="updateDayMax()"><div class="spin-btns"><div class="spin-btn" onclick="spin('yr',1,1900,2060);updateDayMax()">▲</div><div class="spin-btn" onclick="spin('yr',-1,1900,2060);updateDayMax()">▼</div></div></div></div></div>
    <div class="form-row"><div class="form-label">Mois</div><div class="form-input"><select id="mo" onchange="updateDayMax()"><option value="1">Janvier</option><option value="2" selected>Février</option><option value="3">Mars</option><option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option><option value="7">Juillet</option><option value="8">Août</option><option value="9">Septembre</option><option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option></select></div></div>

  <div class="section" id="pr-top" style="text-align:left">
    <div class="sec-title">Les Quatre Piliers 四柱</div>

function dim(y,m){return[0,31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m];}
function updateDayMax(){const y=parseInt(document.getElementById('yr').value)||1986,m=parseInt(document.getElementById('mo').value)||1,mx=dim(y,m),el=document.getElementById('dy');el.max=mx;if(parseInt(el.value)>mx)el.value=mx;}
function spin(id,d,mn,mx){const el=document.getElementById(id);let v=parseInt(el.value)||mn;v+=d;if(v<mn)v=mx;if(v>mx)v=mn;el.value=v;}
function spinDay(d){const y=parseInt(document.getElementById('yr').value)||1986,m=parseInt(document.getElementById('mo').value)||1;spin('dy',d,1,dim(y,m));}

function parseTime(s){const p=(s||'').split(':');let h=parseInt(p[0]),mn=parseInt(p[1]);if(isNaN(h))h=0;if(isNaN(mn))mn=0;return{h:Math.max(0,Math.min(23,h)),mn:Math.max(0,Math.min(59,mn))};}

  const pillars=[{label:'Heure 時',t:HT,b:HB,data:hLbl},{label:'Jour 日',t:DT,b:DB,data:`${d}`},{label:'Mois 月',t:MT,b:MB,data:MOIS_FR[m]},{label:'Année 年',t:YT,b:YB,data:`${y}`}];
  const st=calcStars(pillars,DT,YB,DB,false);
  const row=(lb,cells)=>`<tr><td class="row-label">${lbl(lb)}</td>${cells.map(c=>`<td class="col-pilier">${c}</td>`).join('')}</tr>`;
  document.getElementById('baziTable').innerHTML=`<colgroup><col style="width:105px"><col><col><col><col></colgroup>`+row('Piliers',pillars.map(p=>`<div class="cell-header">${p.label}</div>`))+row('Date',pillars.map(p=>`<div class="cell-data">${p.data}</div>`))+row('Troncs célestes',pillars.map((p,i)=>troncCell(p.t,DT,i===1)))+row('Branches terrestres',pillars.map(p=>branchCell(p.b)))+row('Troncs cachés',pillars.map(p=>hsCell(p.b,DT,false)))+row('Étoiles',st.map(s=>`<div class="cell-stars">${s.length?s.join('<br>'):'&nbsp;'}</div>`))+row('Nayins',pillars.map(p=>`<div class="cell-nayin">${nayin(p.t,p.b)}</div>`));
  const allP=[{t:YT,b:YB},{t:MT,b:MB},{t:DT,b:DB},{t:HT,b:HB}],dmE=T[DT].e,dmC=ECOLS[dmE];
  const sup={Bois:'Eau',Feu:'Bois',Terre:'Feu',Métal:'Terre',Eau:'Métal'},sn=['Hiver','Hiver','Printemps','Printemps','Printemps','Été','Été','Été','Automne','Automne','Automne','Hiver'];
  let sc2=0;if(B[MB].e===dmE)sc2+=100;else if(sup[dmE]===B[MB].e)sc2+=60;allP.forEach(p=>{if(T[p.t].e===dmE||T[p.t].e===sup[dmE])sc2+=20;if(B[p.b].e===dmE||B[p.b].e===sup[dmE])sc2+=15;});sc2=Math.min(sc2,400);
  const sp2=Math.round(sc2/400*100),sl=sp2>60?'Fort':sp2>40?'Moyen':'Faible';
  document.getElementById('dmDiv').innerHTML=`<div style="font-size:34px;color:${dmC}">${T[DT].c}</div><div class="dm-details"><div class="dm-name" style="color:${dmC}">${T[DT].fr} (${T[DT].p})</div><div class="dm-sub">Saison : ${sn[MB]} · Maître ${sl}</div><div class="sbar"><div class="sbar-fill" style="width:${sp2}%;background:${dmC}"></div></div></div>`;
  const eS={Bois:0,Feu:0,Terre:0,Métal:0,Eau:0};allP.forEach(p=>{eS[T[p.t].e]+=20;eS[B[p.b].e]+=15;B[p.b].hs.forEach(hi=>{eS[T[hi].e]+=5;});});
  const tot=Object.values(eS).reduce((a,b)=>a+b,0);
  const g2={Bois:'Feu',Feu:'Terre',Terre:'Métal',Métal:'Eau',Eau:'Bois'},c2={Bois:'Terre',Feu:'Métal',Terre:'Eau',Métal:'Bois',Eau:'Feu'},cb2={Terre:'Bois',Métal:'Feu',Eau:'Terre',Bois:'Métal',Feu:'Eau'},gb2={Feu:'Bois',Terre:'Feu',Métal:'Terre',Eau:'Métal',Bois:'Eau'};
  const ro=['Ressource','Parallèle','Production','Richesse','Pouvoir'],ef={'Parallèle':dmE,'Production':g2[dmE],'Richesse':c2[dmE],'Pouvoir':cb2[dmE],'Ressource':gb2[dmE]};
  document.getElementById('elemsDiv').innerHTML=ro.map(r=>{const el=ef[r],pct=tot>0?Math.round(eS[el]/tot*100):0,col=ECOLS[el];return`<div class="e-row"><span class="e-name" style="color:${col}">${el}</span><span class="e-role">${r}</span><div class="e-bg"><div class="e-fill" style="width:${pct}%;background:${col}"></div></div><span class="e-pct">${pct}%</span></div>`;}).join('');
  const isYang=T[YT].y===1,isMale=gender==='m',fwd=(isYang&&isMale)||(!isYang&&!isMale);
  let ct=MT,cb=MB;const lps=[];
  for(let i=0;i<8;i++){if(fwd){ct=(ct+1)%10;cb=(cb+1)%12}else{ct=(ct+9)%10;cb=(cb+11)%12}lps.push({t:ct,b:cb,age:5+(i*10),sy:y+5+(i*10)});}
  const cy=new Date().getFullYear(),lpst=calcStars(lps,DT,YB,DB,true);
  document.getElementById('lpHeader').innerHTML=lps.map(lp=>`<div>${lp.age} ans</div>`).join('');
  document.getElementById('lpTopGrid').innerHTML=lps.map(lp=>{const tC=ECOLS[T[lp.t].e],bC=ECOLS[B[lp.b].e];const isCurDy=(cy>=lp.sy&&cy<lp.sy+10);return`<div class="lp-col${isCurDy?' lp-cur':''}"><div class="lp-tronc"><div style="font-size:7px;color:#999">${tgL(getTG(DT,lp.t))}</div><div style="font-size:8px;font-weight:500;color:${tC}">${T[lp.t].fr}</div><div style="font-size:9px;color:${tC}">${T[lp.t].p}</div><div style="font-size:20px;line-height:1;margin:2px 0;color:${tC}">${T[lp.t].c}</div></div><div class="lp-div"></div><div class="lp-branch"><div style="font-size:20px;line-height:1;margin:2px 0;color:${bC}">${B[lp.b].c}</div><div style="font-size:10px;color:${bC}">${B[lp.b].p} · <span style="font-weight:500">${B[lp.b].a}</span></div></div><div class="lp-div" style="opacity:.5"></div>${hsCell(lp.b,DT,true)}</div>`;}).join('');
  document.getElementById('lpStarsRow').innerHTML=lpst.map(s=>`<div class="lp-stars-cell">${s.length?s.join('<br>'):'&nbsp;'}</div>`).join('');
  document.getElementById('lpNayinRow').innerHTML=lps.map(lp=>`<div class="lp-nayin-cell">${nayin(lp.t,lp.b)}</div>`).join('');
  // Colonne latérale : même structure que le tableau thème
  function sideCol(ti, bi, label) {
    const starsArr = calcStars([{t:ti,b:bi}], DT, YB, DB, true)[0];
    const starsHTML = starsArr.length ? starsArr.join('<br>') : '&nbsp;';
    const col_t = ECOLS[T[ti].e], col_b = ECOLS[B[bi].e];
    return `<table style="width:100%;border-collapse:collapse;table-layout:fixed">
      <tr><td style="background:#f5f5f3;border-bottom:0.5px solid #bbb;text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:#555">${label}</td></tr>
      <tr><td style="border-bottom:0.5px solid #bbb">${troncCell(ti, DT, false)}</td></tr>
      <tr><td style="border-bottom:0.5px solid #bbb">${branchCell(bi)}</td></tr>
      <tr><td style="border-bottom:0.5px solid #bbb">${hsCell(bi, DT, false)}</td></tr>
      <tr><td style="border-bottom:0.5px solid #bbb"><div class="cell-stars">${starsHTML}</div></td></tr>
      <tr><td><div class="cell-nayin">${nayin(ti, bi)}</div></td></tr>
    </table>`;
  }
  const curLP = lps.find(lp => cy >= lp.sy && cy < lp.sy + 10);
  if (curLP) {
    const dayunTitle = `<div style="background:#f5f5f3;border-bottom:1.5px solid #bbb;text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em">Dayun en cours</div>`;
    document.getElementById('pr-curdayun').innerHTML = dayunTitle + sideCol(curLP.t, curLP.b, curLP.age + ' ans');
  }
  const atY = ytf(cy), abY = ybf(cy);
  const yearTitle = `<div style="background:#f5f5f3;border-bottom:1.5px solid #bbb;text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em">Année</div>`;
  document.getElementById('pr-curyear').innerHTML = yearTitle + sideCol(atY, abY, cy);
  document.getElementById('lpYearsGrid').innerHTML=lps.map(lp=>{let html='<div class="lp-years-col">';for(let ay=lp.sy;ay<lp.sy+10;ay++){const at=ytf(ay),ab=ybf(ay),cur=(ay===cy),tCY=ECOLS[T[at].e],bCY=ECOLS[B[ab].e];html+=`<div class="lp-year-item${cur?' cur':''}"><span class="lp-year-num">${ay}</span><div style="display:flex;align-items:baseline"><span style="font-size:13px;line-height:1;color:${tCY}">${T[at].c}</span><span style="font-size:13px;line-height:1;color:${bCY}">${B[ab].c}</span></div></div>`;}return html+'</div>';}).join('');
  const r=document.getElementById('result');r.style.height='auto';r.style.overflow='visible';r.style.margin='';r.style.padding='';r.style.display='block';document.getElementById('print-btn-wrap').style.display='block';
});
</script>
